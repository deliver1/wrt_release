name: Release WRT
run-name: Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Device Model'
        required: true
        default: 'redmi_ax6_libwrt'
        type: choice
        options:
          - 'redmi_ax6_immortal'
          - 'redmi_ax6_native'
          - 'v2_immort'
          - 'redmi_ax6_libwrt'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        # 使用 22.04 是最稳妥的选择，能避开 GCC 14 带来的大量源码兼容性报错
        os: [ubuntu-22.04]
    runs-on: ${{ matrix.os }}

    steps:
      # 1. 检出代码 (必须步骤)
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo apt -y install libfuse-dev
          sudo apt -y autoremove --purge
          sudo apt -y autoclean

      - name: Set Build Date and Timezone
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          echo "BUILD_DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      # 2. 预克隆脚本 (适配 wrt_core 路径)
      - name: Pre Clone
        run: |
          if [ -f "./wrt_core/pre_clone_action.sh" ]; then
            chmod +x ./wrt_core/pre_clone_action.sh
            ./wrt_core/pre_clone_action.sh ${{ inputs.model }}
          fi

      # 3. 源码补丁：修复 iproute2 和 libubox 的编译 bug
      - name: Patch Sources
        run: |
          echo "正在应用源码补丁以兼容编译器..."
          # 修复 iproute2 缺少 limits.h 导致的 UINT_MAX 报错
          find . -name utils_math.c -exec sed -i '1i#include <limits.h>' {} +
          # 修复 libubox 的格式化字符串检查错误
          find . -name Makefile -path "*/libubox/*" -exec sed -i 's/TARGET_CFLAGS += /TARGET_CFLAGS += -Wno-error=format-nonliteral /' {} +

      # 4. 依赖缓存 (已升级至 v4 版本)
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            .action_build/staging_dir
            .action_build/dl
          key: ${{ matrix.os }}-build-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-build-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d ".action_build/staging_dir" ]; then
            find ".action_build/staging_dir" -type d -name "stamp" -not -path "*/target/*" | while read -r dir; do find "$dir" -type f -exec touch {} + ; done
          fi

      # 5. 执行正式编译
      - name: Build Firmware
        run: |
          chmod +x build.sh
          ./build.sh ${{ inputs.model }}

      # 6. 获取内核版本 (使用递归搜索适配子目录)
      - name: Get Kernel Version
        run: |
          VERSION_FILE=$(find . -name "kernel-defaults.mk" | head -n 1)
          if [ -n "$VERSION_FILE" ]; then
            K_VER=$(grep -E "^LINUX_VERSION:=" "$VERSION_FILE" | cut -d'=' -f2 | tr -d ' ')
            echo "KERNEL_VERSION=$K_VER" >> $GITHUB_ENV
          else
            echo "KERNEL_VERSION=unknown" >> $GITHUB_ENV
          fi

      - name: Delete Old Cache
        run: |
          gh cache list --key ${{ matrix.os }}-build-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[].key' | while read -r key; do gh cache delete "$key"; done || true

      # 7. 准备 Release 描述 (移除 WiFi 描述，增加内存优化说明)
      - name: Prepare Release Body
        run: |
          CONFIG_FILE=$(find . -name ".config" | head -n 1)
          echo "编译完成时间：$(date +'%Y-%m-%d %H:%M')" > release_body.txt
          echo "内核版本：${{ env.KERNEL_VERSION }}" >> release_body.txt
          echo "源码地址：https://github.com/deliver1/openwrt-6.x.git" >> release_body.txt
          echo "LAN地址：192.168.10.1" >> release_body.txt
          echo "💡 特色：无 WiFi 精简版 | 已集成 zram-swap & earlyoom" >> release_body.txt
          
          if [ -n "$CONFIG_FILE" ]; then
            echo "已安装插件清单：" >> release_body.txt
            grep "CONFIG_PACKAGE_luci-app-" "$CONFIG_FILE" | grep "=y" | cut -d'_' -f3- | cut -d'=' -f1 | sed 's/^/  - /' >> release_body.txt
          fi

      # 8. 发布 Release 并上传所有固件 (包含 factory.ubi)
      - name: Release Firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_DATE }}-${{ inputs.model }}
          files: |
            **/bin/targets/**/*.bin
            **/bin/targets/**/*.img*
            **/bin/targets/**/*.ubi
            **/bin/targets/**/*.manifest
          body_path: release_body.txt
