name: Release WRT
run-name: Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Device Model'
        required: true
        default: 'redmi_ax6_immortal'
        type: choice
        options:
          - 'redmi_ax6_immortal'
          - 'redmi_ax6_native'
          - 'v2_immort'
          - 'redmi_ax6_libwrt'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      # 1. 必须先检出代码，否则后面所有脚本都找不到 [修复 image_e9d8d8.png]
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo apt -y install libfuse-dev
          sudo apt -y autoremove --purge
          sudo apt -y autoclean

      - name: Set Build Date and Timezone
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          echo "BUILD_DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      # 现在有代码了，这一步就不会报错了
      - name: Pre Clone
        run: chmod +x ./wrt_release/pre_clone_action.sh && ./wrt_release/pre_clone_action.sh ${{ inputs.model }}

      # 使用 v4 版本修复 image_f94d75.png 的废弃报错
      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            .action_build/staging_dir
            .action_build/dl
          key: ${{ matrix.os }}-build-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-build-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          [ -d ".action_build/staging_dir" ] && find ".action_build/staging_dir" -type d -name "stamp" -not -path "*/target/*" | while read -r dir; do find "$dir" -type f -exec touch {} + ; done

      # 2. 核心补丁：修复 image_fa507e.png 中的 GCC 14 编译报错
      - name: Patch libubox for GCC 14
        run: |
          if [ -d "package/libs/libubox" ]; then
            echo "正在为 GCC 14 修复 libubox..."
            sed -i 's/TARGET_CFLAGS += /TARGET_CFLAGS += -Wno-error=format-nonliteral /' package/libs/libubox/Makefile
          fi

      - name: Build Firmware
        run: chmod +x build.sh && ./build.sh ${{ inputs.model }}

      - name: Get Kernel Version
        run: |
          echo "KERNEL_VERSION=$(grep -oP '(?<=LINUX_VERSION:=).*' include/kernel-defaults.mk || echo 'unknown')" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          gh cache list --key ${{ matrix.os }}-build-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[].key' | while read -r key; do gh cache delete "$key"; done || true

      - name: Machine Information
        run: |
          echo "--------------------------"
          lscpu | grep -E "name|Thread"
          echo "--------------------------"

      - name: Package OpenWrt Firmware
        if: ${{ inputs.model == 'v2_immort' }}
        run: |
          tar -cvf firmware.tar bin/targets/

      - name: Prepare Release Body
        run: |
          echo "编译完成时间：$(date +'%Y-%m-%d %H:%M')" > release_body.txt
          echo "内核版本：${{ env.KERNEL_VERSION }}" >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_DATE }}-${{ inputs.model }}
          files: |
            bin/targets/**/immortalwrt-*.{bin,img.gz}
          body_path: release_body.txt
