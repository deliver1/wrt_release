name: Release WRT
run-name: Release - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: redmi_ax6_libwrt
        options:
          - redmi_ax6_immortal
          - redmi_ax6_native
          - redmi_ax6_libwrt
          # 这里保留你原有的所有机型选项...

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        # 你原来的脚本用的是 24.04，这正是 GCC 14 报错的根源
        # 我保留 24.04，但增加了补丁步骤
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Free disk space
        uses: sbwml/actions@free-disk

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          # 自动从你的 .ini 文件获取源码地址
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${{ inputs.model }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      # --- 关键新增：修复 iproute2 和 libubox 在 GCC 14 下的编译报错 ---
      - name: Fix GCC 14 Source Bugs
        run: |
          echo "正在应用源码补丁..."
          # 1. 修复 iproute2 缺少 limits.h 导致的 UINT_MAX 错误
          find . -name utils_math.c -exec sed -i '1i#include <limits.h>' {} +
          # 2. 修复 libubox 格式化检查错误
          find . -name Makefile -path "*/libubox/*" -exec sed -i 's/TARGET_CFLAGS += /TARGET_CFLAGS += -Wno-error=format-nonliteral /' {} +

      - name: Cache Dependencies
        uses: actions/cache@v5.0.2
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build Firmware
        run: ./build.sh ${{ inputs.model }}

      - name: Get Kernel Verion
        run: |
          # 使用你原有的逻辑从 ./firmware 目录抓取内核版本
          echo "KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}" | head -n 1)" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done

      - name: Prepare Release Body
        run: |
          echo "红米 AX6 无 WiFi 优化版发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "内核版本: ${{ env.KVER }}" >> release_body.txt
          echo "LAN地址: 192.168.10.1 (默认)" >> release_body.txt
          echo "💡 特色：精简无线驱动 | 集成 Nikki | 内存优化补丁" >> release_body.txt
          echo "包含插件：" >> release_body.txt
          # 自动列出你安装的所有 luci-app 插件
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print $NF}' | sort | uniq | sed 's/^/  - /')" >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          # 适配你的输出目录 ./firmware
          files: ${{ inputs.model == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt
